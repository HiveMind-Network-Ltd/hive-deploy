# Add this block inside your existing <VirtualHost> block in your Apache2 site config.
# It proxies /deploy/* to hive-deploy running on localhost:5678.
#
# Example site config path: /etc/apache2/sites-enabled/your-site.conf
# Required modules: sudo a2enmod proxy proxy_http

    # hive-deploy webhook proxy
    ProxyPreserveHost On
    ProxyPass        /deploy/ http://127.0.0.1:5678/
    ProxyPassReverse /deploy/ http://127.0.0.1:5678/
