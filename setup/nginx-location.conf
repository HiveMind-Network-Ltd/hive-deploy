# Add this block inside your existing server {} block in your Nginx site config.
# It proxies /deploy/* to hive-deploy running on localhost:5678.
#
# Example site config path: /etc/nginx/sites-enabled/your-site.conf

location /deploy/ {
    proxy_pass         http://127.0.0.1:5678;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 10s;
    proxy_connect_timeout 5s;
}
